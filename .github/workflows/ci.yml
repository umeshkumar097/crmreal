name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  API_IMAGE: crm-api
  WEB_IMAGE: crm-web

jobs:
  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter api lint

      - name: Lint Web
        run: pnpm --filter web lint

      - name: TypeCheck API
        run: pnpm --filter api typecheck

      - name: TypeCheck Web
        run: pnpm --filter web typecheck

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api prisma generate
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/crm_test

      - name: Run DB Migrations
        run: pnpm --filter api prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/crm_test

      - name: Run API Tests
        run: pnpm --filter api test:cov
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/crm_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api/coverage/lcov.info

  # ─── Build Docker Images ─────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push API Image
        run: |
          docker build -t $REGISTRY/$API_IMAGE:${{ steps.tag.outputs.TAG }} \
                       -t $REGISTRY/$API_IMAGE:latest \
                       --target production \
                       ./apps/api
          docker push $REGISTRY/$API_IMAGE:${{ steps.tag.outputs.TAG }}
          docker push $REGISTRY/$API_IMAGE:latest

      - name: Build & Push Web Image
        run: |
          docker build -t $REGISTRY/$WEB_IMAGE:${{ steps.tag.outputs.TAG }} \
                       -t $REGISTRY/$WEB_IMAGE:latest \
                       --target runner \
                       ./apps/web
          docker push $REGISTRY/$WEB_IMAGE:${{ steps.tag.outputs.TAG }}
          docker push $REGISTRY/$WEB_IMAGE:latest

  # ─── Deploy to Staging ────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy to staging namespace
        run: |
          kubectl set image deployment/crm-api \
            api=${{ secrets.ACR_LOGIN_SERVER }}/$API_IMAGE:${GITHUB_SHA::8} \
            -n crm-staging
          kubectl set image deployment/crm-web \
            web=${{ secrets.ACR_LOGIN_SERVER }}/$WEB_IMAGE:${GITHUB_SHA::8} \
            -n crm-staging
          kubectl rollout status deployment/crm-api -n crm-staging
          kubectl rollout status deployment/crm-web -n crm-staging
